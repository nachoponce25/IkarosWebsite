    <style>
        body
        {
            margin: 0;
            padding: 0;
        }
        .hero
        {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
        }
        .hero::before
        {
            background: url(Content/Images/space4k.png);
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            filter: brightness(60%);
        }
        
        .hero-content
        {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .hero-logo
        {
            position: relative;
            top: -50px;
            width: 500px;
            height: 500px;
        }
        @media screen and (max-width: 800px)
        {
            .hero::before
            {
                background: url(Content/Images/space1080.png);
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                background-size: contain;
                background-repeat: no-repeat;
                background-position: top center;
                filter: brightness(60%);
            }
            .hero-logo
            {
                position: relative;
                top: 0px;
                width: 150px;
                height: 150px;
            }
        }
    </style>

</head>
